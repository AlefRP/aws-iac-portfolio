name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting
        run: terraform fmt -check -recursive -diff

  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - .
          - modules/s3_bucket
          - modules/iam_user
          - examples/basic
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init (no backend)
        working-directory: ${{ matrix.path }}
        run: terraform init -backend=false

      - name: Validate
        working-directory: ${{ matrix.path }}
        run: terraform validate

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --recursive --format=compact

  test:
    name: terraform test
    runs-on: ubuntu-latest
    needs: [fmt, validate]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init root
        run: terraform init -backend=false

      - name: Run root tests
        run: terraform test

      - name: Test s3_bucket module
        working-directory: modules/s3_bucket
        run: |
          terraform init -backend=false
          terraform test

      - name: Test iam_user module
        working-directory: modules/iam_user
        run: |
          terraform init -backend=false
          terraform test

  trivy:
    name: trivy security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          exit-code: 1
          severity: HIGH,CRITICAL
